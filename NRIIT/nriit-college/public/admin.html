<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - NRIIT</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <h1>🎓 NRIIT College</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="student.html">Student Portal</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h2 class="page-title">Admin Dashboard</h2>

        <!-- Statistics -->
        <div class="grid">
            <div class="stat-box">
                <h3 id="totalStudents">0</h3>
                <p>Total Students</p>
            </div>
            <div class="stat-box">
                <h3 id="totalCourses">5</h3>
                <p>Active Programs</p>
            </div>
            <div class="stat-box">
                <h3 id="totalBranches">5</h3>
                <p>Departments</p>
            </div>
        </div>

        <!-- Admin Authentication -->
        <div class="card" id="loginCard">
            <h3>🔐 Admin Login</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label for="adminEmail">Admin Email:</label>
                    <input type="email" id="adminEmail" placeholder="admin@nriit.edu" required>
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password:</label>
                    <input type="password" id="adminPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-success">Login</button>
            </form>
        </div>

        <!-- Admin Dashboard (Hidden until login) -->
        <div id="adminDashboard" class="hidden">
            <div class="card">
                <h3>📊 Admin Controls</h3>
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="exportStudentData()">📥 Export Student Data</button>
                    <button class="btn btn-warning" onclick="logout()" style="background-color: #f39c12;">🚪 Logout</button>
                </div>
            </div>

            <div class="card">
                <h3>👥 All Students Management</h3>
                <div style="margin-bottom: 15px;">
                    <input type="text" id="adminSearchInput" placeholder="🔍 Search students..." 
                           style="width: 300px; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div style="overflow-x: auto;">
                    <table class="table" id="adminStudentsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Course</th>
                                <th>Semester</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminStudentsBody">
                            <tr><td colspan="6" style="text-align: center; padding: 20px;">No students found.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 NRIIT College. All rights reserved.</p>
    </footer>
    
    <script src="js/app.js"></script>
</body>
</html>
